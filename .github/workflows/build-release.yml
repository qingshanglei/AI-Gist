name: Build and Release

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      version:
        description: '版本号 (例如: v0.1.1)'
        required: false
        default: ''

permissions:
  contents: write

jobs:
  create-release:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.get_version.outputs.version }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '22'

      - name: Get version
        id: get_version
        env:
          EVENT_NAME: ${{ github.event_name }}
          INPUT_VERSION: ${{ github.event.inputs.version }}
        run: |
          PACKAGE_VERSION="v$(node -p "require('./package.json').version")"

          if [[ "$EVENT_NAME" == "workflow_dispatch" && -n "$INPUT_VERSION" ]]; then
            VERSION="$INPUT_VERSION"
          else
            VERSION="$PACKAGE_VERSION"
          fi

          if [[ "$VERSION" != v* ]]; then
            VERSION="v$VERSION"
          fi

          if [[ ! "$VERSION" =~ ^v[0-9]+\.[0-9]+\.[0-9]+([+-][0-9A-Za-z.+-]+)?$ ]]; then
            echo "::error::Invalid version '$VERSION'. Use v1.2.3 or 1.2.3."
            exit 1
          fi

          if [[ "$VERSION" != "$PACKAGE_VERSION" ]]; then
            echo "::error::Release version '$VERSION' must match package.json version '$PACKAGE_VERSION'. Update package.json first."
            exit 1
          fi

          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Create Git Tag
        env:
          RELEASE_VERSION: ${{ steps.get_version.outputs.version }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          if git ls-remote --exit-code --tags origin "refs/tags/$RELEASE_VERSION" >/dev/null 2>&1; then
            echo "Tag $RELEASE_VERSION already exists, skipping tag creation"
          else
            git tag -a "$RELEASE_VERSION" -m "Release $RELEASE_VERSION"
            git push origin "$RELEASE_VERSION"
            echo "Created and pushed tag $RELEASE_VERSION"
          fi

      - name: Create Draft GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          tag_name: ${{ steps.get_version.outputs.version }}
          name: AI Gist ${{ steps.get_version.outputs.version }}
          draft: true
          prerelease: false
          generate_release_notes: true

  build-mac:
    needs: create-release
    runs-on: macos-latest
    strategy:
      matrix:
        arch: [x64, arm64]
    steps:
      - uses: actions/checkout@v6

      - name: Setup Python 3
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: 'yarn'

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install setuptools wheel

      - run: yarn install --frozen-lockfile
      - run: npm install -g typescript

      - name: Build and Publish (macOS)
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
          CSC_IDENTITY_AUTO_DISCOVERY: false
          PYTHON: python3
          npm_config_python: python3
        run: |
          node scripts/build.js
          yarn electron-builder --mac --${{ matrix.arch }} --publish always

  build-windows:
    needs: create-release
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v6

      - name: Setup Python 3
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: 'yarn'

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install setuptools wheel

      - run: yarn install --frozen-lockfile
      - run: npm install -g typescript

      - name: Build and Publish (Windows)
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
        run: |
          node scripts/build.js
          yarn electron-builder --win --publish always

  build-linux:
    needs: create-release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Setup Python 3
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: 'yarn'

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install setuptools wheel

      - run: yarn install --frozen-lockfile
      - run: npm install -g typescript

      - name: Build and Publish (Linux)
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
        run: |
          node scripts/build.js
          yarn electron-builder --linux --publish always

  build-android:
    needs: create-release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Setup JDK 21
        uses: actions/setup-java@v5
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: 'yarn'

      - run: yarn install --frozen-lockfile
      - run: npm install -g typescript

      - name: Build mobile web assets
        run: yarn build:mobile

      - name: Configure Android SDK path
        run: echo "sdk.dir=$ANDROID_HOME" > android/local.properties

      - name: Fix Gradle distribution URL
        run: |
          sed -i 's|distributionUrl=.*|distributionUrl=https\\://services.gradle.org/distributions/gradle-8.14.3-bin.zip|' android/gradle/wrapper/gradle-wrapper.properties

      - name: Check signing configuration
        id: signing
        run: |
          if [ -n "${{ secrets.ANDROID_KEYSTORE_BASE64 }}" ]; then
            echo "available=true" >> $GITHUB_OUTPUT
          else
            echo "available=false" >> $GITHUB_OUTPUT
          fi

      - name: Decode Keystore
        if: steps.signing.outputs.available == 'true'
        run: echo "${{ secrets.ANDROID_KEYSTORE_BASE64 }}" | base64 -d > android/app/release.keystore

      - name: Build Signed Release APK
        if: steps.signing.outputs.available == 'true'
        working-directory: android
        run: |
          ./gradlew assembleRelease \
            -Pandroid.injected.signing.store.file=${{ github.workspace }}/android/app/release.keystore \
            -Pandroid.injected.signing.store.password="${{ secrets.ANDROID_KEY_STORE_PASSWORD }}" \
            -Pandroid.injected.signing.key.alias="${{ secrets.ANDROID_KEY_ALIAS }}" \
            -Pandroid.injected.signing.key.password="${{ secrets.ANDROID_KEY_PASSWORD }}"

      - name: Build Debug APK (No Signing Config)
        if: steps.signing.outputs.available != 'true'
        working-directory: android
        run: ./gradlew assembleDebug

      - name: Collect and rename APK
        run: |
          VERSION="${{ needs.create-release.outputs.version }}"
          APK=$(find android/app/build/outputs/apk -name "*.apk" | head -1)
          cp "$APK" "AI-Gist-${VERSION}-android.apk"

      - name: Upload APK to Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION="${{ needs.create-release.outputs.version }}"
          gh release upload "$VERSION" AI-Gist-*.apk \
            --repo ${{ github.repository }} \
            --clobber
